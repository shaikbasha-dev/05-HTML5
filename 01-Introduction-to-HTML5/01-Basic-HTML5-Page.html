<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Specifies the character encoding -->
    <meta charset="UTF-8">

    <!-- Makes the webpage responsive on all devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title displayed in the browser tab -->
    <title>Basic HTML5 Page</title>
</head>
<body>

    <h1>Welcome to HTML5</h1>

    <p>
        This is a basic HTML5 webpage demonstrating the minimum
        structure required to create a valid HTML document.
    </p>

</body>
</html>

<!-- 
Explanation

This example demonstrates the minimum structure required for every HTML5 document.

Elements Used
<!DOCTYPE html> — Declares the document as HTML5.
<html> — Root element of the webpage.
lang="en" — Specifies the document language.
<head> — Contains metadata.
<meta charset="UTF-8"> — Supports Unicode characters.
<meta name="viewport"> — Enables responsive design.
<title> — Displays the page title in the browser tab.
<body> — Contains all visible webpage content.
<h1> — Main heading.
<p> — Paragraph.
-->
