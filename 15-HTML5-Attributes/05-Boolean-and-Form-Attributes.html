<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boolean and Form Attributes Demo</title>

    <style>

        body{
            font-family:Arial, sans-serif;
            background:#f5f5f5;
            margin:40px;
        }

        h1{
            color:#1f4e79;
        }

        form{
            background:white;
            border:1px solid #cccccc;
            border-radius:8px;
            padding:25px;
            width:420px;
        }

        label{
            font-weight:bold;
        }

        input,
        select{
            width:100%;
            padding:8px;
            margin-top:5px;
            margin-bottom:15px;
            box-sizing:border-box;
        }

        input[type="checkbox"]{
            width:auto;
        }

        button{
            padding:10px 20px;
            cursor:pointer;
        }

    </style>

</head>
<body>

    <h1>HTML5 Boolean and Form Attributes</h1>

    <form>

        <label for="fullname">
            Full Name
        </label>

        <input
            type="text"
            id="fullname"
            name="fullname"
            placeholder="Enter your full name"
            required
            autofocus>

        <label for="email">
            Email Address
        </label>

        <input
            type="email"
            id="email"
            name="email"
            placeholder="example@email.com"
            autocomplete="email"
            required>

        <label for="employeeId">
            Employee ID
        </label>

        <input
            type="text"
            id="employeeId"
            value="EMP1001"
            readonly>

        <label for="country">
            Country
        </label>

        <select id="country">

            <option selected>
                India
            </option>

            <option>
                USA
            </option>

            <option>
                Canada
            </option>

        </select>

        <label>

            <input
                type="checkbox"
                checked>

            Accept Terms and Conditions

        </label>

        <br><br>

        <label for="comments">
            Comments
        </label>

        <input
            type="text"
            id="comments"
            value="Comment section is disabled."
            disabled>

        <br>

        <button type="submit">
            Submit
        </button>

    </form>

</body>
</html>
