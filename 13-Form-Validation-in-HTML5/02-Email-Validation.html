<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Email Validation</title>

    <style>

        *{
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            margin:0;
            padding:40px;
            background:#f4f4f4;
        }

        .container{
            max-width:500px;
            margin:auto;
            background:#ffffff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:8px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            font-size:16px;
        }

        input[type="submit"]{
            margin-top:25px;
            cursor:pointer;
        }

        p{
            font-size:14px;
            color:#555;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Email Validation</h1>

        <form>

            <label for="name">

                Full Name

            </label>

            <input
                type="text"
                id="name"
                name="name"
                placeholder="Enter your full name"
                required>

            <label for="email">

                Email Address

            </label>

            <input
                type="email"
                id="email"
                name="email"
                placeholder="example@domain.com"
                required>

            <p>
                Enter a valid email address in the format
                <strong>example@domain.com</strong>.
            </p>

            <input
                type="submit"
                value="Submit">

        </form>

    </div>

</body>

</html>
