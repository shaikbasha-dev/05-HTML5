<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Pattern Validation</title>

    <style>

        *{
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            margin:0;
            padding:40px;
            background:#f4f4f4;
        }

        .container{
            max-width:550px;
            margin:auto;
            background:#ffffff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:8px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            font-size:16px;
        }

        input[type="submit"]{
            margin-top:25px;
            cursor:pointer;
        }

        ul{
            margin-top:10px;
            padding-left:20px;
            font-size:14px;
            color:#555;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Pattern Validation</h1>

        <form>

            <label for="username">

                Username

            </label>

            <input
                type="text"
                id="username"
                name="username"
                placeholder="Enter your username"
                pattern="[A-Za-z0-9]{5,15}"
                title="Username must contain 5 to 15 letters or numbers only."
                required>

            <label for="phone">

                Mobile Number

            </label>

            <input
                type="tel"
                id="phone"
                name="phone"
                placeholder="9876543210"
                pattern="[0-9]{10}"
                title="Enter exactly 10 digits."
                required>

            <ul>
                <li>Username: 5–15 letters or numbers only.</li>
                <li>Mobile Number: Exactly 10 numeric digits.</li>
            </ul>

            <input
                type="submit"
                value="Validate">

        </form>

    </div>

</body>

</html>
