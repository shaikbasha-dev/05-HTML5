<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Complete HTML5 Validation Demo</title>

    <style>

        *{
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            margin:0;
            padding:40px;
            background:#f4f4f4;
        }

        .container{
            max-width:700px;
            margin:auto;
            background:#ffffff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:8px;
            font-weight:bold;
        }

        input,
        select,
        textarea{
            width:100%;
            padding:10px;
            font-size:16px;
        }

        textarea{
            resize:vertical;
        }

        input[type="submit"]{
            margin-top:25px;
            cursor:pointer;
        }

        small{
            color:#666;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Complete HTML5 Validation Demo</h1>

        <form id="registrationForm">

            <label for="fullName">

                Full Name

            </label>

            <input
                type="text"
                id="fullName"
                name="fullName"
                minlength="3"
                maxlength="50"
                required>

            <label for="email">

                Email Address

            </label>

            <input
                type="email"
                id="email"
                name="email"
                required>

            <label for="phone">

                Mobile Number

            </label>

            <input
                type="tel"
                id="phone"
                name="phone"
                pattern="[0-9]{10}"
                title="Enter exactly 10 digits."
                required>

            <label for="age">

                Age

            </label>

            <input
                type="number"
                id="age"
                name="age"
                min="18"
                max="60"
                required>

            <label for="website">

                Portfolio Website

            </label>

            <input
                type="url"
                id="website"
                name="website"
                placeholder="https://example.com">

            <label for="course">

                Course

            </label>

            <select
                id="course"
                name="course"
                required>

                <option value="">
                    -- Select Course --
                </option>

                <option value="HTML5">
                    HTML5
                </option>

                <option value="CSS3">
                    CSS3
                </option>

                <option value="JavaScript">
                    JavaScript
                </option>

                <option value="Java Full Stack">
                    Java Full Stack
                </option>

            </select>

            <label for="password">

                Password

            </label>

            <input
                type="password"
                id="password"
                name="password"
                minlength="8"
                maxlength="20"
                required>

            <label for="confirmPassword">

                Confirm Password

            </label>

            <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                required>

            <small>
                Password and Confirm Password must be identical.
            </small>

            <label for="comments">

                Comments

            </label>

            <textarea
                id="comments"
                name="comments"
                rows="4"
                maxlength="250"
                placeholder="Enter your comments..."></textarea>

            <input
                type="submit"
                value="Submit Form">

        </form>

    </div>

    <script>

        const password =
            document.getElementById("password");

        const confirmPassword =
            document.getElementById("confirmPassword");

        function validatePassword() {

            if (password.value !== confirmPassword.value) {

                confirmPassword.setCustomValidity(
                    "Passwords do not match."
                );

            }
            else {

                confirmPassword.setCustomValidity("");

            }

        }

        password.addEventListener(
            "input",
            validatePassword
        );

        confirmPassword.addEventListener(
            "input",
            validatePassword
        );

    </script>

</body>

</html>
