<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Student Form Validation</title>

    <style>

        *{
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            margin:0;
            padding:40px;
            background:#f4f4f4;
        }

        .container{
            max-width:650px;
            margin:auto;
            background:#ffffff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:8px;
            font-weight:bold;
        }

        input,
        select{
            width:100%;
            padding:10px;
            font-size:16px;
        }

        input[type="submit"]{
            margin-top:25px;
            cursor:pointer;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Student Registration Form</h1>

        <form>

            <label for="studentName">

                Student Name

            </label>

            <input
                type="text"
                id="studentName"
                name="studentName"
                minlength="3"
                maxlength="50"
                required>

            <label for="email">

                Email Address

            </label>

            <input
                type="email"
                id="email"
                name="email"
                required>

            <label for="mobile">

                Mobile Number

            </label>

            <input
                type="tel"
                id="mobile"
                name="mobile"
                pattern="[0-9]{10}"
                title="Enter exactly 10 digits."
                required>

            <label for="dob">

                Date of Birth

            </label>

            <input
                type="date"
                id="dob"
                name="dob"
                required>

            <label for="course">

                Select Course

            </label>

            <select
                id="course"
                name="course"
                required>

                <option value="">
                    -- Select Course --
                </option>

                <option value="Java">
                    Java
                </option>

                <option value="Python">
                    Python
                </option>

                <option value="HTML5">
                    HTML5
                </option>

                <option value="CSS3">
                    CSS3
                </option>

                <option value="JavaScript">
                    JavaScript
                </option>

            </select>

            <label for="percentage">

                Percentage

            </label>

            <input
                type="number"
                id="percentage"
                name="percentage"
                min="0"
                max="100"
                step="0.01"
                required>

            <input
                type="submit"
                value="Submit">

        </form>

    </div>

</body>

</html>
