<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Required Field Validation</title>

    <style>

        *{
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f4f4;
            margin:0;
            padding:40px;
        }

        .container{
            max-width:500px;
            margin:auto;
            background:#ffffff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:8px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            font-size:16px;
        }

        input[type="submit"]{
            margin-top:25px;
            cursor:pointer;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Required Field Validation</h1>

        <form>

            <label for="fullName">

                Full Name

            </label>

            <input
                type="text"
                id="fullName"
                name="fullName"
                placeholder="Enter your full name"
                required>

            <label for="email">

                Email Address

            </label>

            <input
                type="email"
                id="email"
                name="email"
                placeholder="example@email.com"
                required>

            <label for="mobile">

                Mobile Number

            </label>

            <input
                type="tel"
                id="mobile"
                name="mobile"
                placeholder="Enter your mobile number"
                required>

            <label for="password">

                Password

            </label>

            <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                required>

            <input
                type="submit"
                value="Register">

        </form>

    </div>

</body>

</html>
