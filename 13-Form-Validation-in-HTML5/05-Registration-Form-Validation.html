<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Registration Form Validation</title>

    <style>

        *{
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            margin:0;
            padding:40px;
            background:#f4f4f4;
        }

        .container{
            max-width:600px;
            margin:auto;
            background:#ffffff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:8px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            font-size:16px;
        }

        input[type="submit"]{
            margin-top:25px;
            cursor:pointer;
        }

        p{
            font-size:14px;
            color:#555;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Registration Form Validation</h1>

        <form>

            <label for="fullName">

                Full Name

            </label>

            <input
                type="text"
                id="fullName"
                name="fullName"
                minlength="3"
                maxlength="50"
                required>

            <label for="email">

                Email Address

            </label>

            <input
                type="email"
                id="email"
                name="email"
                required>

            <label for="mobile">

                Mobile Number

            </label>

            <input
                type="tel"
                id="mobile"
                name="mobile"
                pattern="[0-9]{10}"
                title="Enter exactly 10 digits."
                required>

            <label for="age">

                Age

            </label>

            <input
                type="number"
                id="age"
                name="age"
                min="18"
                max="60"
                required>

            <label for="password">

                Password

            </label>

            <input
                type="password"
                id="password"
                name="password"
                minlength="8"
                maxlength="20"
                required>

            <p>
                Password must contain between 8 and 20 characters.
            </p>

            <input
                type="submit"
                value="Register">

        </form>

    </div>

</body>

</html>
