<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Password Validation</title>

    <style>

        *{
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            margin:0;
            padding:40px;
            background:#f4f4f4;
        }

        .container{
            max-width:550px;
            margin:auto;
            background:#ffffff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:8px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            font-size:16px;
        }

        input[type="submit"]{
            margin-top:25px;
            cursor:pointer;
        }

        ul{
            margin-top:10px;
            padding-left:20px;
            font-size:14px;
            color:#555;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Password Validation</h1>

        <form>

            <label for="password">

                Password

            </label>

            <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                minlength="8"
                maxlength="20"
                pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,20}"
                required>

            <ul>
                <li>Minimum 8 characters</li>
                <li>Maximum 20 characters</li>
                <li>At least one uppercase letter</li>
                <li>At least one lowercase letter</li>
                <li>At least one numeric digit</li>
            </ul>

            <label for="confirmPassword">

                Confirm Password

            </label>

            <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                placeholder="Re-enter your password"
                required>

            <input
                type="submit"
                value="Create Account">

        </form>

    </div>

</body>

</html>
