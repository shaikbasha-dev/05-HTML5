<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Basic Phone Number Validation</title>

</head>

<body>

    <h1>Basic Phone Number Validation</h1>

    <form>

        <label for="phone">

            Mobile Number

        </label>

        <br><br>

        <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="9876543210"
            required>

        <br><br>

        <input
            type="submit"
            value="Submit">

    </form>

</body>

</html>
