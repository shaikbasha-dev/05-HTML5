<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>International Phone Number Validation</title>

</head>

<body>

    <h1>International Phone Number Validation</h1>

    <form>

        <label for="phone">

            International Phone Number

        </label>

        <br><br>

        <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="+919876543210"
            pattern="\+[1-9][0-9]{7,14}"
            title="Enter a valid international phone number (e.g., +919876543210)."
            required>

        <br><br>

        <input
            type="submit"
            value="Validate">

    </form>

</body>

</html>
