<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login Form</title>

</head>

<body>

    <h1>User Login Form</h1>

    <form action="#"
          method="post"
          autocomplete="on">

        <fieldset>

            <legend>

                Login Details

            </legend>

            <label for="username">

                Username

            </label>

            <br>

            <input
                type="text"
                id="username"
                name="username"
                placeholder="Enter your username"
                required>

            <br><br>

            <label for="email">

                Email Address

            </label>

            <br>

            <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter your email"
                required>

            <br><br>

            <label for="password">

                Password

            </label>

            <br>

            <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                minlength="8"
                required>

            <br><br>

            <input
                type="checkbox"
                id="remember"
                name="remember">

            <label for="remember">

                Remember Me

            </label>

            <br><br>

            <input
                type="submit"
                value="Login">

            <input
                type="reset"
                value="Clear">

        </fieldset>

    </form>

</body>

</html>
