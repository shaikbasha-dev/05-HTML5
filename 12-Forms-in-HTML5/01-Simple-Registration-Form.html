<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Simple Registration Form</title>

</head>

<body>

    <h1>Simple Registration Form</h1>

    <form action="#"
          method="post">

        <label for="fullName">
            Full Name
        </label>

        <br>

        <input
            type="text"
            id="fullName"
            name="fullName"
            placeholder="Enter your full name"
            required>

        <br><br>

        <label for="email">
            Email Address
        </label>

        <br>

        <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required>

        <br><br>

        <label for="password">
            Password
        </label>

        <br>

        <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter password"
            minlength="8"
            required>

        <br><br>

        <label for="mobile">
            Mobile Number
        </label>

        <br>

        <input
            type="tel"
            id="mobile"
            name="mobile"
            placeholder="Enter mobile number"
            required>

        <br><br>

        <label>
            Gender
        </label>

        <br>

        <input
            type="radio"
            id="male"
            name="gender"
            value="Male">

        <label for="male">
            Male
        </label>

        <input
            type="radio"
            id="female"
            name="gender"
            value="Female">

        <label for="female">
            Female
        </label>

        <input
            type="radio"
            id="other"
            name="gender"
            value="Other">

        <label for="other">
            Other
        </label>

        <br><br>

        <label>
            Skills
        </label>

        <br>

        <input
            type="checkbox"
            id="html"
            name="skills"
            value="HTML">

        <label for="html">
            HTML
        </label>

        <input
            type="checkbox"
            id="css"
            name="skills"
            value="CSS">

        <label for="css">
            CSS
        </label>

        <input
            type="checkbox"
            id="javascript"
            name="skills"
            value="JavaScript">

        <label for="javascript">
            JavaScript
        </label>

        <br><br>

        <label for="country">
            Country
        </label>

        <br>

        <select
            id="country"
            name="country"
            required>

            <option value="">
                -- Select Country --
            </option>

            <option>
                India
            </option>

            <option>
                USA
            </option>

            <option>
                Canada
            </option>

            <option>
                Australia
            </option>

        </select>

        <br><br>

        <label for="address">
            Address
        </label>

        <br>

        <textarea
            id="address"
            name="address"
            rows="5"
            cols="40"
            placeholder="Enter your address"></textarea>

        <br><br>

        <input
            type="submit"
            value="Register">

        <input
            type="reset"
            value="Reset">

    </form>

</body>

</html>
