<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Complete HTML5 Form Demo</title>

</head>

<body>

    <h1>Complete HTML5 Form Demo</h1>

    <form action="#"
          method="post"
          enctype="multipart/form-data"
          autocomplete="on">

        <fieldset>

            <legend>

                Personal Information

            </legend>

            <label for="fullName">

                Full Name

            </label>

            <br>

            <input
                type="text"
                id="fullName"
                name="fullName"
                placeholder="Enter your full name"
                required>

            <br><br>

            <label for="email">

                Email Address

            </label>

            <br>

            <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter your email"
                required>

            <br><br>

            <label for="password">

                Password

            </label>

            <br>

            <input
                type="password"
                id="password"
                name="password"
                minlength="8"
                required>

            <br><br>

            <label for="phone">

                Mobile Number

            </label>

            <br>

            <input
                type="tel"
                id="phone"
                name="phone"
                pattern="[0-9]{10}"
                placeholder="9876543210"
                required>

            <br><br>

            <label for="dob">

                Date of Birth

            </label>

            <br>

            <input
                type="date"
                id="dob"
                name="dob"
                required>

            <br><br>

            <label for="age">

                Age

            </label>

            <br>

            <input
                type="number"
                id="age"
                name="age"
                min="18"
                max="100">

            <br><br>

            <label>

                Gender

            </label>

            <br>

            <input
                type="radio"
                id="male"
                name="gender"
                value="Male">

            <label for="male">

                Male

            </label>

            <input
                type="radio"
                id="female"
                name="gender"
                value="Female">

            <label for="female">

                Female

            </label>

            <input
                type="radio"
                id="other"
                name="gender"
                value="Other">

            <label for="other">

                Other

            </label>

        </fieldset>

        <br>

        <fieldset>

            <legend>

                Professional Information

            </legend>

            <label for="course">

                Course

            </label>

            <br>

            <select
                id="course"
                name="course"
                required>

                <option value="">

                    -- Select Course --

                </option>

                <option>

                    Java Full Stack

                </option>

                <option>

                    Python Full Stack

                </option>

                <option>

                    Manual Testing

                </option>

                <option>

                    Cloud Computing

                </option>

            </select>

            <br><br>

            <label>

                Skills

            </label>

            <br>

            <input
                type="checkbox"
                id="html"
                name="skills"
                value="HTML">

            <label for="html">

                HTML

            </label>

            <br>

            <input
                type="checkbox"
                id="css"
                name="skills"
                value="CSS">

            <label for="css">

                CSS

            </label>

            <br>

            <input
                type="checkbox"
                id="javascript"
                name="skills"
                value="JavaScript">

            <label for="javascript">

                JavaScript

            </label>

            <br>

            <input
                type="checkbox"
                id="java"
                name="skills"
                value="Java">

            <label for="java">

                Java

            </label>

            <br><br>

            <label for="experience">

                Experience (Years)

            </label>

            <br>

            <input
                type="range"
                id="experience"
                name="experience"
                min="0"
                max="20"
                value="2">

        </fieldset>

        <br>

        <fieldset>

            <legend>

                Additional Information

            </legend>

            <label for="website">

                Website

            </label>

            <br>

            <input
                type="url"
                id="website"
                name="website"
                placeholder="https://example.com">

            <br><br>

            <label for="resume">

                Upload Resume

            </label>

            <br>

            <input
                type="file"
                id="resume"
                name="resume">

            <br><br>

            <label for="color">

                Favorite Color

            </label>

            <br>

            <input
                type="color"
                id="color"
                name="color">

            <br><br>

            <label for="feedback">

                Feedback

            </label>

            <br>

            <textarea
                id="feedback"
                name="feedback"
                rows="6"
                cols="50"
                placeholder="Enter your feedback..."></textarea>

        </fieldset>

        <br>

        <input
            type="submit"
            value="Submit Form">

        <input
            type="reset"
            value="Reset Form">

    </form>

</body>

</html>
