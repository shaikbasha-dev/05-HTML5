<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Employee Registration Form</title>

</head>

<body>

    <h1>Employee Registration Form</h1>

    <form action="#"
          method="post"
          autocomplete="on">

        <fieldset>

            <legend>

                Employee Details

            </legend>

            <label for="employeeId">

                Employee ID

            </label>

            <br>

            <input
                type="text"
                id="employeeId"
                name="employeeId"
                placeholder="Enter Employee ID"
                required>

            <br><br>

            <label for="fullName">

                Full Name

            </label>

            <br>

            <input
                type="text"
                id="fullName"
                name="fullName"
                placeholder="Enter Full Name"
                required>

            <br><br>

            <label for="email">

                Email Address

            </label>

            <br>

            <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter Email Address"
                required>

            <br><br>

            <label for="phone">

                Mobile Number

            </label>

            <br>

            <input
                type="tel"
                id="phone"
                name="phone"
                placeholder="Enter Mobile Number"
                pattern="[0-9]{10}"
                required>

            <br><br>

            <label for="department">

                Department

            </label>

            <br>

            <select
                id="department"
                name="department"
                required>

                <option value="">

                    -- Select Department --

                </option>

                <option>

                    Software Development

                </option>

                <option>

                    Quality Assurance

                </option>

                <option>

                    Human Resources

                </option>

                <option>

                    Finance

                </option>

                <option>

                    Marketing

                </option>

            </select>

            <br><br>

            <label for="designation">

                Designation

            </label>

            <br>

            <input
                type="text"
                id="designation"
                name="designation"
                placeholder="Enter Designation"
                required>

            <br><br>

            <label for="experience">

                Years of Experience

            </label>

            <br>

            <input
                type="number"
                id="experience"
                name="experience"
                min="0"
                max="40"
                required>

            <br><br>

            <label for="joiningDate">

                Joining Date

            </label>

            <br>

            <input
                type="date"
                id="joiningDate"
                name="joiningDate"
                required>

            <br><br>

            <label>

                Employment Type

            </label>

            <br>

            <input
                type="radio"
                id="fullTime"
                name="employmentType"
                value="Full Time">

            <label for="fullTime">

                Full Time

            </label>

            <input
                type="radio"
                id="partTime"
                name="employmentType"
                value="Part Time">

            <label for="partTime">

                Part Time

            </label>

            <input
                type="radio"
                id="contract"
                name="employmentType"
                value="Contract">

            <label for="contract">

                Contract

            </label>

            <br><br>

            <label>

                Technical Skills

            </label>

            <br>

            <input
                type="checkbox"
                id="java"
                name="skills"
                value="Java">

            <label for="java">

                Java

            </label>

            <input
                type="checkbox"
                id="sql"
                name="skills"
                value="SQL">

            <label for="sql">

                SQL

            </label>

            <input
                type="checkbox"
                id="html"
                name="skills"
                value="HTML">

            <label for="html">

                HTML

            </label>

            <input
                type="checkbox"
                id="css"
                name="skills"
                value="CSS">

            <label for="css">

                CSS

            </label>

            <br><br>

            <label for="address">

                Address

            </label>

            <br>

            <textarea
                id="address"
                name="address"
                rows="5"
                cols="40"
                placeholder="Enter your address"></textarea>

            <br><br>

            <input
                type="submit"
                value="Register Employee">

            <input
                type="reset"
                value="Reset Form">

        </fieldset>

    </form>

</body>

</html>
