<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Survey Form</title>

</head>

<body>

    <h1>Customer Satisfaction Survey</h1>

    <form action="#"
          method="post"
          autocomplete="on">

        <fieldset>

            <legend>

                Survey Details

            </legend>

            <label for="fullName">

                Full Name

            </label>

            <br>

            <input
                type="text"
                id="fullName"
                name="fullName"
                placeholder="Enter your full name"
                required>

            <br><br>

            <label for="email">

                Email Address

            </label>

            <br>

            <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter your email address"
                required>

            <br><br>

            <label for="age">

                Age

            </label>

            <br>

            <input
                type="number"
                id="age"
                name="age"
                min="18"
                max="100"
                required>

            <br><br>

            <label for="occupation">

                Occupation

            </label>

            <br>

            <select
                id="occupation"
                name="occupation"
                required>

                <option value="">

                    -- Select Occupation --

                </option>

                <option>

                    Student

                </option>

                <option>

                    Employee

                </option>

                <option>

                    Business Owner

                </option>

                <option>

                    Freelancer

                </option>

                <option>

                    Other

                </option>

            </select>

            <br><br>

            <label>

                How satisfied are you with our service?

            </label>

            <br>

            <input
                type="radio"
                id="verySatisfied"
                name="satisfaction"
                value="Very Satisfied"
                required>

            <label for="verySatisfied">

                Very Satisfied

            </label>

            <br>

            <input
                type="radio"
                id="satisfied"
                name="satisfaction"
                value="Satisfied">

            <label for="satisfied">

                Satisfied

            </label>

            <br>

            <input
                type="radio"
                id="neutral"
                name="satisfaction"
                value="Neutral">

            <label for="neutral">

                Neutral

            </label>

            <br>

            <input
                type="radio"
                id="dissatisfied"
                name="satisfaction"
                value="Dissatisfied">

            <label for="dissatisfied">

                Dissatisfied

            </label>

            <br>

            <input
                type="radio"
                id="veryDissatisfied"
                name="satisfaction"
                value="Very Dissatisfied">

            <label for="veryDissatisfied">

                Very Dissatisfied

            </label>

            <br><br>

            <label>

                Which features do you use?

            </label>

            <br>

            <input
                type="checkbox"
                id="feature1"
                name="features"
                value="Website">

            <label for="feature1">

                Website

            </label>

            <br>

            <input
                type="checkbox"
                id="feature2"
                name="features"
                value="Mobile App">

            <label for="feature2">

                Mobile App

            </label>

            <br>

            <input
                type="checkbox"
                id="feature3"
                name="features"
                value="Customer Support">

            <label for="feature3">

                Customer Support

            </label>

            <br>

            <input
                type="checkbox"
                id="feature4"
                name="features"
                value="Online Services">

            <label for="feature4">

                Online Services

            </label>

            <br><br>

            <label for="recommend">

                Would you recommend us?

            </label>

            <br>

            <select
                id="recommend"
                name="recommend"
                required>

                <option value="">

                    -- Select an Option --

                </option>

                <option>

                    Yes

                </option>

                <option>

                    No

                </option>

                <option>

                    Maybe

                </option>

            </select>

            <br><br>

            <label for="comments">

                Additional Comments

            </label>

            <br>

            <textarea
                id="comments"
                name="comments"
                rows="6"
                cols="50"
                placeholder="Share your suggestions or comments..."></textarea>

            <br><br>

            <input
                type="submit"
                value="Submit Survey">

            <input
                type="reset"
                value="Reset Survey">

        </fieldset>

    </form>

</body>

</html>
