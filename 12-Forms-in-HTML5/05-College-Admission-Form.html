<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>College Admission Form</title>

</head>

<body>

    <h1>College Admission Form</h1>

    <form action="#"
          method="post"
          autocomplete="on">

        <fieldset>

            <legend>

                Student Admission Details

            </legend>

            <label for="applicationNumber">

                Application Number

            </label>

            <br>

            <input
                type="text"
                id="applicationNumber"
                name="applicationNumber"
                placeholder="Enter Application Number"
                required>

            <br><br>

            <label for="fullName">

                Full Name

            </label>

            <br>

            <input
                type="text"
                id="fullName"
                name="fullName"
                placeholder="Enter Full Name"
                required>

            <br><br>

            <label for="fatherName">

                Father's Name

            </label>

            <br>

            <input
                type="text"
                id="fatherName"
                name="fatherName"
                placeholder="Enter Father's Name"
                required>

            <br><br>

            <label for="motherName">

                Mother's Name

            </label>

            <br>

            <input
                type="text"
                id="motherName"
                name="motherName"
                placeholder="Enter Mother's Name"
                required>

            <br><br>

            <label for="email">

                Email Address

            </label>

            <br>

            <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter Email Address"
                required>

            <br><br>

            <label for="mobile">

                Mobile Number

            </label>

            <br>

            <input
                type="tel"
                id="mobile"
                name="mobile"
                pattern="[0-9]{10}"
                placeholder="Enter Mobile Number"
                required>

            <br><br>

            <label for="dob">

                Date of Birth

            </label>

            <br>

            <input
                type="date"
                id="dob"
                name="dob"
                required>

            <br><br>

            <label>

                Gender

            </label>

            <br>

            <input
                type="radio"
                id="male"
                name="gender"
                value="Male">

            <label for="male">

                Male

            </label>

            <input
                type="radio"
                id="female"
                name="gender"
                value="Female">

            <label for="female">

                Female

            </label>

            <input
                type="radio"
                id="other"
                name="gender"
                value="Other">

            <label for="other">

                Other

            </label>

            <br><br>

            <label for="course">

                Course Applying For

            </label>

            <br>

            <select
                id="course"
                name="course"
                required>

                <option value="">

                    -- Select Course --

                </option>

                <option>

                    B.Tech

                </option>

                <option>

                    B.Sc

                </option>

                <option>

                    B.Com

                </option>

                <option>

                    BBA

                </option>

                <option>

                    BA

                </option>

            </select>

            <br><br>

            <label for="percentage">

                Previous Examination Percentage

            </label>

            <br>

            <input
                type="number"
                id="percentage"
                name="percentage"
                min="0"
                max="100"
                step="0.01"
                required>

            <br><br>

            <label for="address">

                Address

            </label>

            <br>

            <textarea
                id="address"
                name="address"
                rows="5"
                cols="40"
                placeholder="Enter Your Address"></textarea>

            <br><br>

            <label>

                Required Documents

            </label>

            <br>

            <input
                type="checkbox"
                id="marksMemo"
                name="documents"
                value="Marks Memo">

            <label for="marksMemo">

                Marks Memo

            </label>

            <br>

            <input
                type="checkbox"
                id="transferCertificate"
                name="documents"
                value="Transfer Certificate">

            <label for="transferCertificate">

                Transfer Certificate

            </label>

            <br>

            <input
                type="checkbox"
                id="aadhaar"
                name="documents"
                value="Aadhaar Card">

            <label for="aadhaar">

                Aadhaar Card

            </label>

            <br>

            <input
                type="checkbox"
                id="photo"
                name="documents"
                value="Passport Photo">

            <label for="photo">

                Passport Photo

            </label>

            <br><br>

            <input
                type="submit"
                value="Submit Application">

            <input
                type="reset"
                value="Reset Form">

        </fieldset>

    </form>

</body>

</html>
