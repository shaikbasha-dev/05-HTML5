<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Student Registration Form</title>

</head>

<body>

    <h1>Student Registration Form</h1>

    <form action="#"
          method="post"
          autocomplete="on">

        <fieldset>

            <legend>

                Student Information

            </legend>

            <label for="studentId">

                Student ID

            </label>

            <br>

            <input
                type="text"
                id="studentId"
                name="studentId"
                placeholder="Enter Student ID"
                required>

            <br><br>

            <label for="fullName">

                Full Name

            </label>

            <br>

            <input
                type="text"
                id="fullName"
                name="fullName"
                placeholder="Enter Full Name"
                required>

            <br><br>

            <label for="email">

                Email Address

            </label>

            <br>

            <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter Email Address"
                required>

            <br><br>

            <label for="mobile">

                Mobile Number

            </label>

            <br>

            <input
                type="tel"
                id="mobile"
                name="mobile"
                placeholder="Enter Mobile Number"
                pattern="[0-9]{10}"
                required>

            <br><br>

            <label for="dob">

                Date of Birth

            </label>

            <br>

            <input
                type="date"
                id="dob"
                name="dob"
                required>

            <br><br>

            <label>

                Gender

            </label>

            <br>

            <input
                type="radio"
                id="male"
                name="gender"
                value="Male">

            <label for="male">

                Male

            </label>

            <input
                type="radio"
                id="female"
                name="gender"
                value="Female">

            <label for="female">

                Female

            </label>

            <input
                type="radio"
                id="other"
                name="gender"
                value="Other">

            <label for="other">

                Other

            </label>

            <br><br>

            <label for="course">

                Course

            </label>

            <br>

            <select
                id="course"
                name="course"
                required>

                <option value="">

                    -- Select Course --

                </option>

                <option>

                    Java Full Stack

                </option>

                <option>

                    Python Full Stack

                </option>

                <option>

                    Data Science

                </option>

                <option>

                    Cloud Computing

                </option>

            </select>

            <br><br>

            <label>

                Skills

            </label>

            <br>

            <input
                type="checkbox"
                id="html"
                name="skills"
                value="HTML">

            <label for="html">

                HTML

            </label>

            <input
                type="checkbox"
                id="css"
                name="skills"
                value="CSS">

            <label for="css">

                CSS

            </label>

            <input
                type="checkbox"
                id="javascript"
                name="skills"
                value="JavaScript">

            <label for="javascript">

                JavaScript

            </label>

            <br><br>

            <label for="address">

                Address

            </label>

            <br>

            <textarea
                id="address"
                name="address"
                rows="5"
                cols="40"
                placeholder="Enter your address"></textarea>

            <br><br>

            <input
                type="submit"
                value="Register">

            <input
                type="reset"
                value="Reset Form">

        </fieldset>

    </form>

</body>

</html>
