<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Table with Header and Footer</title>

    <style>

        body {

            font-family: Arial, sans-serif;

            background-color: #f4f4f4;

            margin: 30px;

        }

        h1 {

            text-align: center;

            color: #333;

        }

        table {

            width: 85%;

            margin: auto;

            border-collapse: collapse;

            background-color: #ffffff;

        }

        caption {

            font-size: 24px;

            font-weight: bold;

            padding: 12px;

            color: #1565C0;

        }

        th,
        td {

            border: 1px solid #000;

            padding: 12px;

            text-align: center;

        }

        thead {

            background-color: #1976D2;

            color: white;

        }

        tbody tr:nth-child(even) {

            background-color: #f2f2f2;

        }

        tbody tr:hover {

            background-color: #e3f2fd;

        }

        tfoot {

            background-color: #eeeeee;

            font-weight: bold;

        }

    </style>

</head>

<body>

    <h1>HTML Table with Header and Footer</h1>

    <table>

        <caption>Monthly Sales Report - July 2026</caption>

        <thead>

            <tr>

                <th>Product</th>

                <th>Quantity Sold</th>

                <th>Unit Price</th>

                <th>Total Amount</th>

            </tr>

        </thead>

        <tbody>

            <tr>

                <td>Laptop</td>

                <td>12</td>

                <td>₹55,000</td>

                <td>₹660,000</td>

            </tr>

            <tr>

                <td>Monitor</td>

                <td>20</td>

                <td>₹12,000</td>

                <td>₹240,000</td>

            </tr>

            <tr>

                <td>Keyboard</td>

                <td>35</td>

                <td>₹1,500</td>

                <td>₹52,500</td>

            </tr>

            <tr>

                <td>Mouse</td>

                <td>40</td>

                <td>₹800</td>

                <td>₹32,000</td>

            </tr>

        </tbody>

        <tfoot>

            <tr>

                <td colspan="3">Grand Total</td>

                <td>₹984,500</td>

            </tr>

        </tfoot>

    </table>

</body>

</html>
