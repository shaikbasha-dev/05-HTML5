<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Basic HTML Table</title>

    <style>

        body {

            font-family: Arial, sans-serif;

            margin: 30px;

            background-color: #f4f4f4;

        }

        h1 {

            text-align: center;

            color: #333;

        }

        table {

            width: 60%;

            margin: auto;

            border-collapse: collapse;

            background-color: white;

        }

        th,
        td {

            border: 1px solid #000;

            padding: 12px;

            text-align: center;

        }

        th {

            background-color: #4CAF50;

            color: white;

        }

    </style>

</head>

<body>

    <h1>Basic HTML Table</h1>

    <table>

        <tr>

            <th>ID</th>

            <th>Name</th>

            <th>Course</th>

        </tr>

        <tr>

            <td>101</td>

            <td>Alice</td>

            <td>Java</td>

        </tr>

        <tr>

            <td>102</td>

            <td>Bob</td>

            <td>Python</td>

        </tr>

        <tr>

            <td>103</td>

            <td>Charlie</td>

            <td>HTML5</td>

        </tr>

    </table>

</body>

</html>
