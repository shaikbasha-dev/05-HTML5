<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Table with Caption</title>

    <style>

        body {

            font-family: Arial, sans-serif;

            background-color: #f4f4f4;

            margin: 30px;

        }

        h1 {

            text-align: center;

            color: #333;

        }

        table {

            width: 80%;

            margin: auto;

            border-collapse: collapse;

            background-color: #ffffff;

        }

        caption {

            caption-side: top;

            font-size: 24px;

            font-weight: bold;

            padding: 12px;

            color: #0d47a1;

        }

        th,
        td {

            border: 1px solid #000;

            padding: 12px;

            text-align: center;

        }

        th {

            background-color: #1976D2;

            color: white;

        }

        tr:nth-child(even) {

            background-color: #f2f2f2;

        }

        tr:hover {

            background-color: #e3f2fd;

        }

    </style>

</head>

<body>

    <h1>HTML Table with Caption</h1>

    <table>

        <caption>Employee Salary Report - 2026</caption>

        <tr>

            <th>Employee ID</th>

            <th>Employee Name</th>

            <th>Department</th>

            <th>Monthly Salary</th>

        </tr>

        <tr>

            <td>EMP101</td>

            <td>Rahul Sharma</td>

            <td>Development</td>

            <td>₹60,000</td>

        </tr>

        <tr>

            <td>EMP102</td>

            <td>Anjali Verma</td>

            <td>Testing</td>

            <td>₹55,000</td>

        </tr>

        <tr>

            <td>EMP103</td>

            <td>Priya Nair</td>

            <td>Finance</td>

            <td>₹58,000</td>

        </tr>

        <tr>

            <td>EMP104</td>

            <td>Arjun Patel</td>

            <td>Marketing</td>

            <td>₹52,000</td>

        </tr>

    </table>

</body>

</html>
