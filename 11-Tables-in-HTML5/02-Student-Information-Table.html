<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Information Table</title>

    <style>

        body {

            font-family: Arial, sans-serif;

            background-color: #f4f4f4;

            margin: 30px;

        }

        h1 {

            text-align: center;

            color: #333;

        }

        table {

            width: 80%;

            margin: auto;

            border-collapse: collapse;

            background-color: #ffffff;

        }

        th,
        td {

            border: 1px solid #000;

            padding: 12px;

            text-align: center;

        }

        th {

            background-color: #2196F3;

            color: white;

        }

        tr:nth-child(even) {

            background-color: #f2f2f2;

        }

        tr:hover {

            background-color: #e8f4fd;

        }

    </style>

</head>

<body>

    <h1>Student Information Table</h1>

    <table>

        <tr>

            <th>Student ID</th>

            <th>Name</th>

            <th>Course</th>

            <th>Age</th>

            <th>Grade</th>

        </tr>

        <tr>

            <td>101</td>

            <td>Alice Johnson</td>

            <td>Java</td>

            <td>20</td>

            <td>A</td>

        </tr>

        <tr>

            <td>102</td>

            <td>Bob Smith</td>

            <td>Python</td>

            <td>21</td>

            <td>A+</td>

        </tr>

        <tr>

            <td>103</td>

            <td>Charlie Brown</td>

            <td>HTML5</td>

            <td>19</td>

            <td>B+</td>

        </tr>

        <tr>

            <td>104</td>

            <td>David Wilson</td>

            <td>CSS3</td>

            <td>22</td>

            <td>A</td>

        </tr>

        <tr>

            <td>105</td>

            <td>Emma Davis</td>

            <td>JavaScript</td>

            <td>20</td>

            <td>A+</td>

        </tr>

    </table>

</body>

</html>
